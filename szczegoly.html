<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BoliHelp AI - Szczegóły objawu</title>

<link rel="stylesheet" href="assets/css/style.css">

</head>


<body>


<header class="top">

<div class="logo">
🩺 BoliHelp <span>2.0 AI</span>
</div>

<a href="index.html" class="language">
⬅ Strona główna
</a>

</header>




<section class="hero">


<h1 id="title">
🩺 Informacja
</h1>



<div id="details" class="result-box" style="display:block">

<p>
Ładowanie informacji...
</p>

</div>


</section>




<footer>

© 2026 BoliHelp 2.0 AI

</footer>





<script>


const params = new URLSearchParams(window.location.search);

const objaw = params.get("objaw");



const data = {

title:"🧠 Głowa",

info:"Ból głowy może być związany ze zmęczeniem, stresem, odwodnieniem, infekcją lub innymi przyczynami.",

warning:"Nagły bardzo silny ból głowy, zaburzenia mowy, utrata siły lub świadomości wymagają pilnej pomocy."

},



oczy: {

title:"👁️ Oczy",

info:"Ból oczu może wystąpić przy zmęczeniu, podrażnieniu lub infekcji.",

warning:"Nagła utrata widzenia lub silny ból oka wymagają szybkiej konsultacji."

},




gardlo: {

title:"🗣️ Gardło",

info:"Ból gardła często pojawia się podczas infekcji.",

warning:"Problemy z oddychaniem lub przełykaniem wymagają pilnej pomocy."

},




ucho: {

title:"👂 Ucho",

info:"Ból ucha może być związany z infekcją lub podrażnieniem.",

},




klatka: {

title:"❤️ Klatka piersiowa",

info:"Ból w klatce piersiowej może mieć wiele różnych przyczyn.",

warning:"Nagły silny ból w klatce piersiowej wymaga natychmiastowej pomocy."

},




brzuch: {

title:"🫃 Brzuch",

info:"Ból brzucha może mieć różne przyczyny, od problemów trawiennych po inne dolegliwości.",

},




plecy: {

title:"🦴 Plecy",

info:"Ból pleców często związany jest z przeciążeniem mięśni lub kręgosłupa.",

warning:"Osłabienie nóg lub problemy z kontrolą oddawania moczu wymagają pilnej konsultacji."

},

title:"🦵 Kolano",

info:"Ból kolana może wynikać z urazu, przeciążenia lub problemów ze stawem.",

title:"🌡️ Gorączka",

},




kaszel: {

title:"🫁 Kaszel",

info:"Kaszel może pojawić się przy infekcji dróg oddechowych lub podrażnieniu.",

},

title:"🌸 Skóra",

info:"Zmiany skórne mogą mieć wiele przyczyn, np. podrażnienie lub alergię.",

warning:"Szybko rozprzestrzeniająca się wysypka lub obrzęk twarzy wymagają pilnej pomocy."

pilne: {

};





if(data[objaw]) {


document.getElementById("title").innerHTML =
data[objaw].title;



document.getElementById("details").innerHTML = `


<h2>${data[objaw].title}</h2>


<p>

<b>Informacja:</b><br>

${data[objaw].info}

</p>



<div class="warning">

⚠️ <b>Uwaga:</b><br>

${data[objaw].warning}

</div>


`;



}
else {


document.getElementById("details").innerHTML = `

<h2>Nie znaleziono informacji</h2>

<p>Wybierz objaw z atlasu.</p>

`;

}


</script>
